events {
    worker_connections 1024;
}

http {
    # 1. Creiamo una variabile dinamica per l'hashing
    map $arg_documentId $route_key {
        # Se documentId esiste nell'URL, usa quello
        "~^.+$"  $arg_documentId; 
        
        # Di default (se l'URL non ha documentId, es. chiamate API o Dashboard)
        # usiamo l'IP dell'utente per bilanciare il traffico tra i server in modo equo
        default  $remote_addr;
    }

    upstream websocket_cluster {
        # 2. Usiamo la nostra variabile dinamica con "consistent"
        hash $route_key consistent;

        server backend1:3000;
        server backend2:3000;
    }

    server {
        listen 3000;

        location / {
            proxy_pass http://websocket_cluster;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
